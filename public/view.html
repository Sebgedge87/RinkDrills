<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IceBoard — Session View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222638;
      --border: #2e3250;
      --text: #e8eaf6;
      --text-dim: #8b90b5;
      --accent: #4f6ef7;
      --orange: #f4a261;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── Header ── */
    #view-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #view-header .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    #view-header .logo span { color: var(--accent); }

    .view-badge {
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(79,110,247,0.15);
      border: 1px solid rgba(79,110,247,0.3);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Loading / error ── */
    #view-loading, #view-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 12px;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    #view-error { color: #e74c3c; }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Session info ── */
    #view-content { max-width: 700px; margin: 0 auto; padding: 24px 16px 60px; }

    .session-hero {
      margin-bottom: 24px;
    }

    .session-title {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .session-meta-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .meta-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .meta-pill strong { color: var(--text); }

    /* ── Timeline bar ── */
    .view-timeline {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 24px;
    }

    .view-timeline-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .view-timeline-bar {
      display: flex;
      height: 24px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .view-timeline-seg {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 2px;
      overflow: hidden;
    }

    .view-timeline-seg span {
      font-size: 0.65rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 1px 2px rgba(0,0,0,.5);
      white-space: nowrap;
      padding: 0 4px;
    }

    .view-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .view-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .view-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── Zone sections ── */
    .view-zone {
      margin-bottom: 20px;
    }

    .view-zone-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .view-zone-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .view-zone-label {
      font-weight: 700;
      font-size: 0.88rem;
    }

    .view-zone-mins {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-left: auto;
    }

    /* ── Drill cards ── */
    .view-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .view-block-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }

    .view-block-header:hover { background: var(--surface2); }

    .view-block-num {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-dim);
      min-width: 20px;
    }

    .view-block-name {
      flex: 1;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .view-block-dur {
      font-size: 0.78rem;
      color: var(--orange);
      font-weight: 600;
      flex-shrink: 0;
    }

    .view-block-chevron {
      font-size: 0.75rem;
      color: var(--text-dim);
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .view-block.expanded .view-block-chevron { transform: rotate(90deg); }

    .view-block-body {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
    }

    .view-block.expanded .view-block-body { display: block; }

    .view-block-note {
      font-size: 0.83rem;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 12px;
      margin-top: 10px;
    }

    .view-block-desc {
      font-size: 0.83rem;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 12px;
    }

    /* ── Mini canvas ── */
    .view-canvas-wrap {
      background: #0a0c14;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      margin-bottom: 10px;
    }

    .view-canvas { border-radius: 4px; max-width: 100%; }

    .view-animate-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--accent);
      border: none;
      color: #fff;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .view-animate-btn:hover { background: #6b84ff; }
    .view-animate-btn.playing { background: #e74c3c; }

    /* ── Footer ── */
    .view-footer {
      margin-top: 40px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .view-footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

<header id="view-header">
  <div class="logo">Ice<span>Board</span></div>
  <span class="view-badge">Player View</span>
</header>

<div id="view-loading">
  <div class="spinner"></div>
  <span>Loading session…</span>
</div>

<div id="view-error" style="display:none">
  <div>⚠️ Session not found</div>
  <div style="font-size:0.8rem">This link may be invalid or the session is not published.</div>
</div>

<div id="view-content" style="display:none"></div>

<script src="rink.js"></script>
<script>
  const token = location.pathname.split('/session/')[1];

  async function loadSession() {
    try {
      const res  = await fetch(`/api/share/${token}`);
      const json = await res.json();
      if (!json.success) throw new Error('not found');
      render(json.data);
    } catch (e) {
      document.getElementById('view-loading').style.display = 'none';
      document.getElementById('view-error').style.display = 'flex';
    }
  }

  const ZONES = [
    { id: 'warmup',         label: 'Warmup',        color: '#ff9800' },
    { id: 'skills',         label: 'Skills',         color: '#2196f3' },
    { id: 'game_situation', label: 'Game Situation', color: '#9c27b0' },
    { id: 'conditioning',   label: 'Conditioning',   color: '#f44336' },
    { id: 'cooldown',       label: 'Cooldown',       color: '#4caf50' },
  ];

  function fmtDate(d, t) {
    if (!d) return null;
    try {
      const dt = new Date(`${d}T${t || '00:00'}`);
      return dt.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })
        + (t ? ' at ' + t : '');
    } catch { return d; }
  }

  function render(s) {
    document.title = `${s.name} — IceBoard`;
    document.getElementById('view-loading').style.display = 'none';
    const content = document.getElementById('view-content');
    content.style.display = 'block';

    // Hero
    const dateStr   = fmtDate(s.date, s.start_time);
    const metaPills = [
      dateStr         ? `<div class="meta-pill">📅 <strong>${dateStr}</strong></div>` : '',
      s.location      ? `<div class="meta-pill">📍 <strong>${esc(s.location)}</strong></div>` : '',
      s.duration_mins ? `<div class="meta-pill">⏱ <strong>${s.duration_mins} min</strong></div>` : '',
      s.team_age      ? `<div class="meta-pill">👥 <strong>${esc(s.team_age)}</strong></div>` : '',
      s.focus         ? `<div class="meta-pill">🎯 <strong>${esc(s.focus)}</strong></div>` : '',
    ].filter(Boolean).join('');

    // Timeline
    const blocks     = s.blocks || [];
    const totalMins  = s.duration_mins || 60;
    const zoneTotals = {};
    ZONES.forEach(z => { zoneTotals[z.id] = 0; });
    blocks.forEach(b => { zoneTotals[b.zone] = (zoneTotals[b.zone] || 0) + (b.duration_mins || 0); });

    const barSegs = ZONES
      .filter(z => zoneTotals[z.id] > 0)
      .map(z => {
        const pct = (zoneTotals[z.id] / totalMins * 100).toFixed(1);
        return `<div class="view-timeline-seg" style="width:${pct}%;background:${z.color}">
          <span>${z.label.split(' ')[0]} ${zoneTotals[z.id]}m</span></div>`;
      }).join('');

    const legendItems = ZONES
      .filter(z => zoneTotals[z.id] > 0)
      .map(z => `<div class="view-legend-item"><div class="view-legend-dot" style="background:${z.color}"></div>${z.label} · ${zoneTotals[z.id]}m</div>`)
      .join('');

    // Zone sections with blocks
    const zoneHtml = ZONES.map(zone => {
      const zb = blocks.filter(b => b.zone === zone.id);
      if (zb.length === 0) return '';
      const mins = zb.reduce((s, b) => s + (b.duration_mins || 0), 0);
      const cards = zb.map((b, i) => buildBlockCard(b, i + 1, zone.color)).join('');
      return `
        <div class="view-zone">
          <div class="view-zone-header">
            <div class="view-zone-dot" style="background:${zone.color}"></div>
            <div class="view-zone-label">${zone.label}</div>
            <div class="view-zone-mins">${mins} min</div>
          </div>
          ${cards}
        </div>
      `;
    }).join('');

    content.innerHTML = `
      <div class="session-hero">
        <h1 class="session-title">${esc(s.name)}</h1>
        <div class="session-meta-pills">${metaPills}</div>
      </div>
      <div class="view-timeline">
        <div class="view-timeline-label">Session Plan</div>
        <div class="view-timeline-bar">${barSegs}</div>
        <div class="view-legend">${legendItems}</div>
      </div>
      ${zoneHtml}
      <div class="view-footer">Powered by <a href="/">IceBoard</a> · Coach view available at iceboard app</div>
    `;

    // Wire up expand/collapse and canvas animations
    content.querySelectorAll('.view-block').forEach(card => {
      const header = card.querySelector('.view-block-header');
      header.addEventListener('click', () => {
        const wasExpanded = card.classList.contains('expanded');
        card.classList.toggle('expanded');
        if (!wasExpanded) initBlockCanvas(card);
      });
    });
  }

  let blockNum = 0;
  function buildBlockCard(b, num, zoneColor) {
    const drill = b.drill || null;
    const canvasId = `block-canvas-${num}-${Date.now()}`;
    const animId   = `block-anim-${num}-${Date.now()}`;
    const noteHtml = b.notes ? `<div class="view-block-note">💬 ${esc(b.notes)}</div>` : '';
    const descHtml = drill?.description ? `<div class="view-block-desc">${esc(drill.description)}</div>` : '';

    return `
      <div class="view-block" style="border-left-color:${zoneColor}"
           data-positions='${JSON.stringify(drill?.player_positions || [])}'
           data-arrows='${JSON.stringify(drill?.arrows || [])}'>
        <div class="view-block-header">
          <span class="view-block-num">${num}</span>
          <span class="view-block-name">${b.type === 'sequence' ? '📋' : '🏒'} ${esc(b.ref_name)}</span>
          <span class="view-block-dur">${b.duration_mins} min</span>
          <span class="view-block-chevron">›</span>
        </div>
        <div class="view-block-body">
          ${noteHtml}
          ${descHtml}
          ${drill ? `
            <div class="view-canvas-wrap">
              <canvas class="view-canvas" id="${canvasId}" width="480" height="204"></canvas>
            </div>
            <button class="view-animate-btn" id="${animId}">▶ Animate</button>
          ` : ''}
        </div>
      </div>
    `;
  }

  function initBlockCanvas(card) {
    const canvas = card.querySelector('.view-canvas');
    if (!canvas || canvas.dataset.ready) return;
    canvas.dataset.ready = '1';

    const positions = JSON.parse(card.dataset.positions || '[]');
    const arrows    = JSON.parse(card.dataset.arrows || '[]');
    const ctx       = canvas.getContext('2d');

    drawRink(ctx, canvas.width, canvas.height);
    drawStaticPlayers(ctx, canvas, positions);
    drawStaticArrows(ctx, canvas, arrows, positions);

    const animBtn = card.querySelector('.view-animate-btn');
    if (!animBtn) return;

    let animating = false, animFrame = null, progress = {}, lastTs = null;
    const SPEED = 0.0008;

    animBtn.addEventListener('click', () => {
      if (animating) {
        animating = false;
        if (animFrame) cancelAnimationFrame(animFrame);
        animFrame = null;
        animBtn.textContent = '▶ Animate';
        animBtn.classList.remove('playing');
        drawRink(ctx, canvas.width, canvas.height);
        drawStaticPlayers(ctx, canvas, positions);
        drawStaticArrows(ctx, canvas, arrows, positions);
      } else {
        animating = true;
        progress = {};
        arrows.forEach(a => { progress[a.pid] = 0; });
        lastTs = null;
        animBtn.textContent = '⏹ Stop';
        animBtn.classList.add('playing');
        requestAnimationFrame(step);
      }
    });

    function step(ts) {
      if (!animating) return;
      if (!lastTs) lastTs = ts;
      const dt = ts - lastTs;
      lastTs = ts;

      let allDone = true;
      arrows.forEach(a => {
        progress[a.pid] = Math.min(1, (progress[a.pid] || 0) + SPEED * dt);
        if (progress[a.pid] < 1) allDone = false;
      });

      drawRink(ctx, canvas.width, canvas.height);
      drawStaticArrows(ctx, canvas, arrows, positions);
      drawAnimPlayers(ctx, canvas, positions, arrows, progress);

      if (allDone) { arrows.forEach(a => { progress[a.pid] = 0; }); lastTs = null; }
      animFrame = requestAnimationFrame(step);
    }
  }

  // ── Canvas helpers ────────────────────────────────────────────────────────
  function fracToXY(bx, by, w, h) {
    const scale = Math.min(w / 200, h / 85);
    const rw = scale * 200, rh = scale * 85;
    const ox = (w - rw) / 2, oy = (h - rh) / 2;
    return { x: ox + bx * rw, y: oy + by * rh };
  }

  function drawStaticPlayers(ctx, canvas, positions) {
    const scale = Math.min(canvas.width / 200, canvas.height / 85);
    const r = Math.max(8, scale * 1.8);
    const COLS = { red: { player: '#e63946', gk: '#ff8fa3' }, blue: { player: '#1d6fa0', gk: '#74c0fc' } };
    positions.forEach(p => {
      const pos   = fracToXY(p.bx, p.by, canvas.width, canvas.height);
      const color = (COLS[p.team] || COLS.red)[p.role === 'gk' ? 'gk' : 'player'];
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(7, r * 0.65)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.id.toUpperCase(), pos.x, pos.y);
    });
  }

  function drawAnimPlayers(ctx, canvas, positions, arrows, progress) {
    const scale = Math.min(canvas.width / 200, canvas.height / 85);
    const r = Math.max(8, scale * 1.8);
    const COLS = { red: { player: '#e63946', gk: '#ff8fa3' }, blue: { player: '#1d6fa0', gk: '#74c0fc' } };
    positions.forEach(p => {
      const arr = arrows.find(a => a.pid === p.id);
      let pos;
      if (arr && progress[p.id] !== undefined) {
        const t = progress[p.id];
        const s = fracToXY(p.bx, p.by, canvas.width, canvas.height);
        const e = fracToXY(arr.tbx, arr.tby, canvas.width, canvas.height);
        pos = { x: s.x + (e.x - s.x) * t, y: s.y + (e.y - s.y) * t };
      } else {
        pos = fracToXY(p.bx, p.by, canvas.width, canvas.height);
      }
      const color = (COLS[p.team] || COLS.red)[p.role === 'gk' ? 'gk' : 'player'];
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = '#fff';
      ctx.font = `bold ${Math.max(7, r * 0.65)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.id.toUpperCase(), pos.x, pos.y);
    });
  }

  function drawStaticArrows(ctx, canvas, arrows, positions) {
    arrows.forEach(arr => {
      const p = positions.find(pl => pl.id === arr.pid);
      if (!p) return;
      const s = fracToXY(p.bx, p.by, canvas.width, canvas.height);
      const e = fracToXY(arr.tbx, arr.tby, canvas.width, canvas.height);
      drawArrow(ctx, s.x, s.y, e.x, e.y);
    });
  }

  function drawArrow(ctx, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 2) return;
    const angle = Math.atan2(dy, dx);
    const hl = 10;
    ctx.save();
    ctx.strokeStyle = '#f4a261';
    ctx.fillStyle   = '#f4a261';
    ctx.lineWidth   = 1.5;
    ctx.setLineDash([5, 4]);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2 - Math.cos(angle) * hl * 0.5, y2 - Math.sin(angle) * hl * 0.5);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath();
    ctx.moveTo(x2, y2);
    ctx.lineTo(x2 - hl * Math.cos(angle - Math.PI / 7), y2 - hl * Math.sin(angle - Math.PI / 7));
    ctx.lineTo(x2 - hl * Math.cos(angle + Math.PI / 7), y2 - hl * Math.sin(angle + Math.PI / 7));
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadSession();
</script>
</body>
</html>
